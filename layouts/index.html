{{ define "main" }}
<main class="main">
    <h1>{{ .Site.Title }}</h1>
    <p>欢迎来到我的博客！</p>
    <ul>
    {{ range where .Site.RegularPages "Section" "posts" }}
        <li>
            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
            - <time>{{ .Date.Format "2006-01-02" }}</time>
        </li>
    {{ end }}
    </ul>
</main>
{{ end }}
